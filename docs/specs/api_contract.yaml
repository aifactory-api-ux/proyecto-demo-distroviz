## 7. Get Trend Data

| Method | Path         | Auth Required | Request Body | Query Params                      | Response Body Schema   | Status Codes |
|--------|--------------|--------------|--------------|-----------------------------------|-----------------------|-------------|
| GET    | /api/trends  | No           | None         | from_date (ISO date, optional)<br>to_date (ISO date, optional) | TrendResponse         | 200         |

**Response Schema (`TrendResponse`):**
```json
{
  "trend": [
    { "date": "2024-04-01", "delivered": 10, "pending": 5 },
    { "date": "2024-04-02", "delivered": 15, "pending": 3 }
  ]
}
```
