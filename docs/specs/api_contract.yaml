## 6. Delete Distribution Order

| Method | Path               | Auth Required | Request Body | Query Params | Response Body Schema         | Status Codes |
|--------|--------------------|--------------|--------------|--------------|-----------------------------|-------------|
| DELETE | /api/orders/{id}   | No           | None         | None         | { "success": true }         | 200         |

**Response Schema:**
```json
{
