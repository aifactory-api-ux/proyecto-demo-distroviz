**Response Schema (`DistributionOrder`):**
```json
{
  "id": 3,
  "order_number": "ORD-20240401-003",
  "product_name": "Producto C",
  "quantity": 150,
  "destination": "Guadalajara",
  "status": "pending",
  "shipped_at": null,
  "delivered_at": null
}
```

