# API_CONTRACT.md

## 1. Get Dashboard Metrics

| Method | Path           | Auth Required | Request Body | Query Params | Response Body Schema | Status Codes |
|--------|----------------|--------------|--------------|-------------|---------------------|-------------|
| GET    | /api/metrics   | No           | None         | None        | Metric              | 200         |

**Response Schema (`Metric`):**
```json
{
  "total_orders": 120,
  "total_quantity": 3500,
  "delivered_orders": 90,
  "pending_orders": 30
}
```

---

## 2. List Distribution Orders (with optional filters)

| Method | Path         | Auth Required | Request Body | Query Params                      | Response Body Schema         | Status Codes |
|--------|--------------|--------------|--------------|-----------------------------------|-----------------------------|-------------|
| GET    | /api/orders  | No           | None         | from_date (ISO date, optional)<br>to_date (ISO date, optional)<br>status (string, optional) | List of DistributionOrder    | 200         |

**Response Schema (`List[DistributionOrder]`):**
```json
[
  {
    "id": 1,
    "order_number": "ORD-20240401-001",
    "product_name": "Producto A",
    "quantity": 100,
    "destination": "CDMX",
    "status": "delivered",
    "shipped_at": "2024-04-01T10:00:00Z",
    "delivered_at": "2024-04-02T15:00:00Z"
  }
]
```

---

## 3. Create Distribution Order

| Method | Path         | Auth Required | Request Body Schema         | Query Params | Response Body Schema      | Status Codes |
|--------|--------------|--------------|----------------------------|--------------|--------------------------|-------------|
| POST   | /api/orders  | No           | DistributionOrderCreate     | None         | DistributionOrder        | 201         |

**Request Schema (`DistributionOrderCreate`):**
```json
{
  "order_number": "ORD-20240401-002",
  "product_name": "Producto B",
  "quantity": 200,
  "destination": "Monterrey",
  "status": "pending",
  "shipped_at": null,
  "delivered_at": null
}
```

**Response Schema (`DistributionOrder`):**
```json
{
  "id": 2,
  "order_number": "ORD-20240401-002",
  "product_name": "Producto B",
  "quantity": 200,
  "destination": "Monterrey",
  "status": "pending",
  "shipped_at": null,
  "delivered_at": null
}
```

---

