services:
  redis:
    image: redis:7-alpine
    container_name: distroviz-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - distroviz-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: distroviz-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/distroviz.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - CACHE_TTL_METRICS=300
      - CACHE_TTL_TRENDS=600
    env_file:
      - .env
    volumes:
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - distroviz-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: distroviz-frontend
    environment:
      - VITE_API_URL=http://backend:8000
    env_file:
      - .env
    volumes:
      - frontend-data:/app/dist
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - distroviz-network

  nginx-proxy:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: distroviz-nginx
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - distroviz-network

networks:
  distroviz-network:
    driver: bridge

volumes:
  backend-data:
  frontend-data:
